spring.application.name=WizardFrac

# Active profile (set to 'dev' to use the built-in H2 configuration)
spring.profiles.active=prod

#########################
# PRODUCTION (Supabase)
#########################
# PostgreSQL/Supabase JDBC URL (includes SSL parameters)
## Use the Supabase pooler JDBC URL by default. Replace the password by setting the
## SPRING_DATASOURCE_PASSWORD environment variable, or edit the value below.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require&ssl=true}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.warmgeynfihumovmilgz}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Let Hibernate manage schema updates; defer data.sql until after schema creation
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

#########################
# DEVELOPMENT (H2) - Local
#########################
# The application includes a DataSource fallback that will automatically use
# an in-memory H2 database when the external DB is not reachable. If you
# prefer to explicitly enable H2 during development, set `spring.profiles.active=dev`
# and uncomment the properties below.

# spring.datasource.url=jdbc:h2:mem:wizardfrac
# spring.datasource.driverClassName=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.jpa.hibernate.ddl-auto=create-drop
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

#########################
# Server
#########################
server.port=8080
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
